<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LoveLink ❤️ — Our Private Universe</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;600&family=Jost:wght@200;300;400;500&display=swap" rel="stylesheet">

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getDatabase, ref, push, onValue, serverTimestamp, set, onDisconnect, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBTJYFK38BnPPzugkeA3f0xn6F_IADATMY",
    authDomain: "jc-learn-73819.firebaseapp.com",
    databaseURL: "https://jc-learn-73819-default-rtdb.firebaseio.com",
    projectId: "jc-learn-73819",
    storageBucket: "jc-learn-73819.firebasestorage.app",
    messagingSenderId: "625242380317",
    appId: "1:625242380317:web:77ae8b4430889afabd4ef4",
    measurementId: "G-8N8CFX7FKC"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getDatabase(app);

  // current user (chosen on the welcome screen)
  let ME = null;
  let OTHER = null;
  const USERS = {
    partner1: { name: "Partner 1", avatar: "💖", color: "#ff6eb4" },
    partner2: { name: "Partner 2", avatar: "💙", color: "#6eb4ff" }
  };

  // ── DOM refs ──────────────────────────────────────────────────────────────
  const welcomeScreen   = document.getElementById("welcome-screen");
  const chatScreen      = document.getElementById("chat-screen");
  const messagesEl      = document.getElementById("messages");
  const inputEl         = document.getElementById("msg-input");
  const sendBtn         = document.getElementById("send-btn");
  const typingEl        = document.getElementById("typing-indicator");
  const otherStatusEl   = document.getElementById("other-status");
  const otherNameEl     = document.getElementById("other-name");
  const otherAvatarEl   = document.getElementById("other-avatar");
  const myAvatarEl      = document.getElementById("my-avatar");
  const myNameEl        = document.getElementById("my-name");

  // ── Choose partner ────────────────────────────────────────────────────────
  document.querySelectorAll(".choose-btn").forEach(btn => {
    btn.addEventListener("click", () => {
      ME    = btn.dataset.user;
      OTHER = ME === "partner1" ? "partner2" : "partner1";
      startChat();
    });
  });

  function startChat() {
    welcomeScreen.classList.add("hidden");
    chatScreen.classList.remove("hidden");

    // Populate header
    const myInfo    = USERS[ME];
    const otherInfo = USERS[OTHER];
    myAvatarEl.textContent    = myInfo.avatar;
    myNameEl.textContent      = myInfo.name;
    otherAvatarEl.textContent = otherInfo.avatar;
    otherNameEl.textContent   = otherInfo.name;

    // Presence
    const presenceRef = ref(db, `presence/${ME}`);
    set(presenceRef, { online: true, name: myInfo.name });
    onDisconnect(presenceRef).set({ online: false, name: myInfo.name });

    // Watch other's presence
    onValue(ref(db, `presence/${OTHER}`), snap => {
      const data = snap.val();
      const online = data?.online === true;
      otherStatusEl.textContent = online ? "Online ❤️" : "Offline";
      otherStatusEl.className   = online ? "status online" : "status offline";
    });

    // Watch typing
    onValue(ref(db, `typing/${OTHER}`), snap => {
      typingEl.style.display = snap.val() ? "flex" : "none";
    });

    // Watch messages
    onValue(ref(db, "messages"), snap => {
      messagesEl.innerHTML = "";
      if (!snap.exists()) return;
      snap.forEach(child => renderMessage(child.val(), child.key));
      scrollBottom();
    });

    // Mark messages seen when window gains focus
    window.addEventListener("focus", markSeen);
    markSeen();
  }

  // ── Typing indicator ──────────────────────────────────────────────────────
  let typingTimer;
  inputEl.addEventListener("input", () => {
    set(ref(db, `typing/${ME}`), true);
    clearTimeout(typingTimer);
    typingTimer = setTimeout(() => set(ref(db, `typing/${ME}`), false), 1500);
  });

  // ── Send message ──────────────────────────────────────────────────────────
  function sendMessage() {
    const text = inputEl.value.trim();
    if (!text) return;
    inputEl.value = "";
    set(ref(db, `typing/${ME}`), false);

    push(ref(db, "messages"), {
      sender: ME,
      text,
      timestamp: Date.now(),
      seen: false
    });

    playSound();
    launchHearts();
  }

  sendBtn.addEventListener("click", sendMessage);
  inputEl.addEventListener("keydown", e => { if (e.key === "Enter" && !e.shiftKey) { e.preventDefault(); sendMessage(); } });

  // ── Mark seen ─────────────────────────────────────────────────────────────
  function markSeen() {
    if (!ME) return;
    get(ref(db, "messages")).then(snap => {
      snap.forEach(child => {
        const d = child.val();
        if (d.sender !== ME && !d.seen) {
          set(ref(db, `messages/${child.key}/seen`), true);
        }
      });
    });
  }

  // ── Render a message ──────────────────────────────────────────────────────
  function renderMessage(data, key) {
    const isMine = data.sender === ME;
    const wrap = document.createElement("div");
    wrap.className = `msg-wrap ${isMine ? "mine" : "theirs"}`;
    wrap.dataset.key = key;

    const time = new Date(data.timestamp).toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    const seenMark = isMine ? `<span class="ticks ${data.seen ? "seen" : ""}">${data.seen ? "✔✔" : "✔"}</span>` : "";

    wrap.innerHTML = `
      <div class="avatar-wrap">${USERS[data.sender].avatar}</div>
      <div class="bubble-col">
        <div class="bubble">${escHtml(data.text)}</div>
        <div class="meta">${time} ${seenMark}</div>
      </div>`;

    // heart reaction on double-tap / dblclick
    wrap.querySelector(".bubble").addEventListener("dblclick", () => {
      const hrt = document.createElement("div");
      hrt.className = "heart-pop";
      hrt.textContent = "❤️";
      wrap.appendChild(hrt);
      setTimeout(() => hrt.remove(), 900);
    });

    messagesEl.appendChild(wrap);
  }

  function escHtml(t) {
    return t.replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/\n/g,"<br>");
  }

  function scrollBottom() {
    messagesEl.scrollTo({ top: messagesEl.scrollHeight, behavior: "smooth" });
  }

  // ── Heart particle burst ──────────────────────────────────────────────────
  function launchHearts() {
    const container = document.getElementById("heart-canvas");
    for (let i = 0; i < 6; i++) {
      const h = document.createElement("div");
      h.className = "float-heart";
      h.textContent = ["❤️","💕","💖","💗","✨"][Math.floor(Math.random()*5)];
      h.style.left = 20 + Math.random() * 60 + "%";
      h.style.animationDuration = 1.2 + Math.random() * 1 + "s";
      container.appendChild(h);
      setTimeout(() => h.remove(), 2500);
    }
  }

  // ── Soft send sound ───────────────────────────────────────────────────────
  function playSound() {
    try {
      const ctx = new (window.AudioContext || window.webkitAudioContext)();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.type = "sine";
      osc.frequency.setValueAtTime(880, ctx.currentTime);
      osc.frequency.exponentialRampToValueAtTime(440, ctx.currentTime + 0.12);
      gain.gain.setValueAtTime(0.08, ctx.currentTime);
      gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.15);
      osc.start(); osc.stop(ctx.currentTime + 0.15);
    } catch {}
  }

  // ── Heart-reaction button ─────────────────────────────────────────────────
  document.getElementById("heart-btn").addEventListener("click", launchHearts);
</script>

<style>
/* ── Reset & base ─────────────────────────────────────────────── */
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
:root {
  --pink:    #ff6eb4;
  --blue:    #6eb4ff;
  --purple:  #c084fc;
  --gold:    #f9c74f;
  --bg:      #05030f;
  --surface: rgba(255,255,255,0.04);
  --glass:   rgba(255,255,255,0.07);
  --border:  rgba(255,255,255,0.10);
  --text:    #f0e6ff;
  --muted:   #8878aa;
  --glow:    0 0 18px rgba(255,110,180,0.55);
  --font-display: 'Cormorant Garamond', serif;
  --font-body:    'Jost', sans-serif;
}

html, body {
  height: 100%; width: 100%;
  background: var(--bg);
  color: var(--text);
  font-family: var(--font-body);
  overflow: hidden;
}

/* ── Starfield background ─────────────────────────────────────── */
body::before {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background:
    radial-gradient(ellipse 80% 60% at 20% 10%, rgba(192,132,252,0.18) 0%, transparent 60%),
    radial-gradient(ellipse 60% 50% at 80% 90%, rgba(255,110,180,0.15) 0%, transparent 60%),
    radial-gradient(ellipse 40% 40% at 60% 40%, rgba(110,180,255,0.10) 0%, transparent 60%),
    #05030f;
  pointer-events: none;
}

/* tiny stars */
body::after {
  content: '';
  position: fixed; inset: 0; z-index: 0;
  background-image:
    radial-gradient(1px 1px at 15% 25%, rgba(255,255,255,0.8) 0%, transparent 100%),
    radial-gradient(1px 1px at 75% 10%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(1.5px 1.5px at 50% 80%, rgba(255,255,255,0.7) 0%, transparent 100%),
    radial-gradient(1px 1px at 90% 55%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 35% 65%, rgba(255,255,255,0.6) 0%, transparent 100%),
    radial-gradient(2px 2px at 60% 30%, rgba(249,199,79,0.6) 0%, transparent 100%),
    radial-gradient(1px 1px at 8%  90%, rgba(255,255,255,0.5) 0%, transparent 100%),
    radial-gradient(1px 1px at 45% 5%,  rgba(255,255,255,0.7) 0%, transparent 100%);
  pointer-events: none;
  animation: twinkle 8s ease-in-out infinite alternate;
}

@keyframes twinkle {
  0%   { opacity: 0.6; }
  100% { opacity: 1; }
}

/* ── Utility ──────────────────────────────────────────────────── */
.hidden { display: none !important; }

/* ── Welcome screen ───────────────────────────────────────────── */
#welcome-screen {
  position: relative; z-index: 10;
  height: 100dvh;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 2rem;
  animation: fadeIn .8s ease both;
}

@keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: none; } }

.welcome-logo {
  font-family: var(--font-display);
  font-size: clamp(2.8rem, 8vw, 5rem);
  font-weight: 300;
  letter-spacing: 0.08em;
  background: linear-gradient(135deg, var(--pink), var(--purple), var(--blue));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  text-shadow: none;
  filter: drop-shadow(0 0 20px rgba(255,110,180,0.4));
}

.welcome-subtitle {
  font-size: 0.9rem;
  font-weight: 200;
  letter-spacing: 0.25em;
  text-transform: uppercase;
  color: var(--muted);
}

.welcome-divider {
  width: 60px; height: 1px;
  background: linear-gradient(90deg, transparent, var(--pink), transparent);
}

.welcome-label {
  font-size: 0.75rem;
  letter-spacing: 0.2em;
  text-transform: uppercase;
  color: var(--muted);
}

.choose-btns {
  display: flex; gap: 1rem; flex-wrap: wrap; justify-content: center;
}

.choose-btn {
  padding: 0.9rem 2.2rem;
  border-radius: 50px;
  border: 1px solid var(--border);
  background: var(--glass);
  color: var(--text);
  font-family: var(--font-body);
  font-size: 0.95rem;
  font-weight: 300;
  letter-spacing: 0.1em;
  cursor: pointer;
  backdrop-filter: blur(12px);
  transition: all 0.3s ease;
  position: relative;
  overflow: hidden;
}

.choose-btn::before {
  content: '';
  position: absolute; inset: 0;
  background: linear-gradient(135deg, rgba(255,110,180,0.15), rgba(110,180,255,0.15));
  opacity: 0;
  transition: opacity 0.3s;
}

.choose-btn:hover { box-shadow: var(--glow); border-color: var(--pink); transform: translateY(-2px); }
.choose-btn:hover::before { opacity: 1; }

.choose-btn[data-user="partner1"] .btn-emoji { color: var(--pink); }
.choose-btn[data-user="partner2"] .btn-emoji { color: var(--blue); }

.firebase-note {
  font-size: 0.7rem; color: var(--muted); text-align: center;
  max-width: 320px; line-height: 1.6; letter-spacing: 0.05em;
}
.firebase-note a { color: var(--purple); text-decoration: none; }

/* ── Chat screen ──────────────────────────────────────────────── */
#chat-screen {
  position: relative; z-index: 10;
  height: 100dvh;
  display: flex; flex-direction: column;
  max-width: 500px;
  margin: 0 auto;
  animation: fadeIn .5s ease both;
}

/* Header */
#chat-header {
  display: flex;
  align-items: center;
  padding: 0.9rem 1.1rem;
  gap: 0.9rem;
  background: rgba(5,3,15,0.7);
  backdrop-filter: blur(20px);
  border-bottom: 1px solid var(--border);
  flex-shrink: 0;
}

.header-avatar {
  width: 44px; height: 44px;
  border-radius: 50%;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem;
  background: var(--glass);
  border: 1.5px solid var(--border);
  box-shadow: 0 0 14px rgba(255,110,180,0.3);
  flex-shrink: 0;
  position: relative;
}

.header-avatar::after {
  content: '';
  position: absolute; bottom: 0; right: 0;
  width: 11px; height: 11px;
  border-radius: 50%;
  background: #2ecc71;
  border: 2px solid var(--bg);
}

.header-info { flex: 1; min-width: 0; }
.header-info h2 {
  font-family: var(--font-display);
  font-size: 1.2rem;
  font-weight: 400;
  letter-spacing: 0.05em;
  white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
}

.status {
  font-size: 0.72rem;
  font-weight: 300;
  letter-spacing: 0.12em;
}
.status.online {
  color: #2ecc71;
  text-shadow: 0 0 8px rgba(46,204,113,0.7);
}
.status.offline { color: var(--muted); }

.header-actions { display: flex; gap: 0.5rem; }

.icon-btn {
  width: 36px; height: 36px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: var(--glass);
  color: var(--text);
  font-size: 1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  backdrop-filter: blur(8px);
}
.icon-btn:hover { border-color: var(--pink); box-shadow: var(--glow); transform: scale(1.08); }

/* My info strip */
#my-info {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.5rem 1.1rem;
  background: rgba(5,3,15,0.5);
  border-bottom: 1px solid var(--border);
  font-size: 0.75rem;
  color: var(--muted);
  flex-shrink: 0;
  letter-spacing: 0.1em;
}
#my-avatar { font-size: 1rem; }

/* Messages area */
#messages {
  flex: 1;
  overflow-y: auto;
  padding: 1rem 0.9rem;
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
  scroll-behavior: smooth;
}

#messages::-webkit-scrollbar { width: 3px; }
#messages::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* Message bubbles */
.msg-wrap {
  display: flex;
  align-items: flex-end;
  gap: 0.5rem;
  animation: msgIn 0.35s cubic-bezier(0.175, 0.885, 0.32, 1.275) both;
}

@keyframes msgIn {
  from { opacity: 0; transform: translateY(14px) scale(0.92); }
  to   { opacity: 1; transform: none; }
}

.msg-wrap.mine    { flex-direction: row-reverse; }
.msg-wrap.theirs  { flex-direction: row; }

.avatar-wrap {
  width: 30px; height: 30px;
  border-radius: 50%;
  font-size: 1rem;
  display: flex; align-items: center; justify-content: center;
  background: var(--glass);
  border: 1px solid var(--border);
  flex-shrink: 0;
}

.bubble-col {
  display: flex; flex-direction: column;
  max-width: min(75%, 320px);
}

.mine .bubble-col  { align-items: flex-end; }
.theirs .bubble-col { align-items: flex-start; }

.bubble {
  padding: 0.65rem 1rem;
  border-radius: 20px;
  font-size: 0.9rem;
  font-weight: 300;
  line-height: 1.5;
  word-break: break-word;
  cursor: pointer;
  transition: transform 0.15s;
}

.bubble:active { transform: scale(0.97); }

.mine .bubble {
  background: linear-gradient(135deg, #c084fc, #ff6eb4);
  color: #fff;
  border-bottom-right-radius: 5px;
  box-shadow: 0 4px 20px rgba(255,110,180,0.35);
}

.theirs .bubble {
  background: var(--glass);
  backdrop-filter: blur(10px);
  border: 1px solid var(--border);
  color: var(--text);
  border-bottom-left-radius: 5px;
}

.meta {
  font-size: 0.65rem;
  color: var(--muted);
  margin-top: 0.2rem;
  letter-spacing: 0.04em;
  display: flex; align-items: center; gap: 0.25rem;
}

.ticks { color: var(--muted); }
.ticks.seen { color: #6eb4ff; text-shadow: 0 0 6px rgba(110,180,255,0.7); }

/* Heart pop on double-click */
.heart-pop {
  position: absolute;
  font-size: 1.5rem;
  pointer-events: none;
  animation: heartPop 0.9s ease forwards;
}
@keyframes heartPop {
  0%   { transform: scale(0) translateY(0); opacity: 1; }
  60%  { transform: scale(1.4) translateY(-20px); opacity: 1; }
  100% { transform: scale(1) translateY(-40px); opacity: 0; }
}

/* Typing indicator */
#typing-indicator {
  display: none;
  align-items: center;
  gap: 0.5rem;
  padding: 0.4rem 1rem;
  font-size: 0.78rem;
  color: var(--muted);
  letter-spacing: 0.05em;
}

.typing-dots { display: flex; gap: 3px; align-items: center; }
.typing-dots span {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--pink);
  animation: dot 1.2s ease-in-out infinite;
}
.typing-dots span:nth-child(2) { animation-delay: 0.2s; }
.typing-dots span:nth-child(3) { animation-delay: 0.4s; }
@keyframes dot {
  0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
  30%            { transform: translateY(-5px); opacity: 1; }
}

/* Input bar */
#input-bar {
  display: flex;
  align-items: center;
  gap: 0.6rem;
  padding: 0.75rem 0.9rem;
  background: rgba(5,3,15,0.75);
  backdrop-filter: blur(20px);
  border-top: 1px solid var(--border);
  flex-shrink: 0;
}

#msg-input {
  flex: 1;
  background: var(--glass);
  border: 1px solid var(--border);
  border-radius: 24px;
  padding: 0.65rem 1.1rem;
  color: var(--text);
  font-family: var(--font-body);
  font-size: 0.9rem;
  font-weight: 300;
  outline: none;
  transition: border-color 0.2s, box-shadow 0.2s;
  resize: none;
  max-height: 100px;
}
#msg-input::placeholder { color: var(--muted); }
#msg-input:focus {
  border-color: rgba(255,110,180,0.5);
  box-shadow: 0 0 14px rgba(255,110,180,0.2);
}

#send-btn {
  width: 44px; height: 44px;
  border-radius: 50%;
  border: none;
  background: linear-gradient(135deg, var(--pink), var(--purple));
  color: #fff;
  font-size: 1.1rem;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  box-shadow: 0 0 18px rgba(255,110,180,0.5);
  transition: all 0.2s;
  flex-shrink: 0;
}
#send-btn:hover { transform: scale(1.1); box-shadow: 0 0 26px rgba(255,110,180,0.7); }
#send-btn:active { transform: scale(0.95); }

/* Floating hearts canvas */
#heart-canvas {
  position: fixed; inset: 0;
  pointer-events: none;
  z-index: 20;
  overflow: hidden;
}

.float-heart {
  position: absolute;
  bottom: 80px;
  font-size: 1.6rem;
  animation: floatUp 2.2s ease-out forwards;
  pointer-events: none;
}

@keyframes floatUp {
  0%   { transform: translateY(0) scale(0.5) rotate(-10deg); opacity: 1; }
  70%  { opacity: 1; }
  100% { transform: translateY(-65vh) scale(1.1) rotate(10deg); opacity: 0; }
}

/* Glow orbs decorative */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(80px);
  pointer-events: none;
  z-index: 0;
}
.orb-1 { width: 300px; height: 300px; background: rgba(255,110,180,0.12); top: -100px; right: -80px; }
.orb-2 { width: 250px; height: 250px; background: rgba(192,132,252,0.10); bottom: 80px; left: -60px; }



/* Responsive */
@media (min-width: 600px) {
  #chat-screen {
    margin: 1rem auto;
    height: calc(100dvh - 2rem);
    border-radius: 24px;
    border: 1px solid var(--border);
    overflow: hidden;
    box-shadow: 0 0 60px rgba(255,110,180,0.12), 0 0 120px rgba(192,132,252,0.08);
  }
}
</style>
</head>
<body>

<!-- Decorative orbs -->
<div class="orb orb-1"></div>
<div class="orb orb-2"></div>

<!-- Floating heart canvas -->
<div id="heart-canvas"></div>



<!-- ── Welcome screen ─────────────────────────────────────────────────────── -->
<div id="welcome-screen">
  <div class="welcome-logo">LoveLink</div>
  <div class="welcome-subtitle">Our Private Universe</div>
  <div class="welcome-divider"></div>
  <div class="welcome-label">Who are you?</div>
  <div class="choose-btns">
    <button class="choose-btn" data-user="partner1">
      <span class="btn-emoji">💖</span> Partner 1
    </button>
    <button class="choose-btn" data-user="partner2">
      <span class="btn-emoji">💙</span> Partner 2
    </button>
  </div>
