<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>LoveLink ✦ Ultra</title>

<style>
:root{
  --p1:#ff6eb4;--p2:#c084fc;--p3:#6eb4ff;--p4:#f9c74f;
  --neon-pink:0 0 20px #ff6eb4,0 0 40px rgba(255,110,180,.4);
  --neon-blue:0 0 20px #6eb4ff,0 0 40px rgba(110,180,255,.4);
  --neon-purple:0 0 20px #c084fc,0 0 40px rgba(192,132,252,.4);
  --bg:#04020e;--glass:rgba(255,255,255,.06);--glass2:rgba(255,255,255,.10);
  --border:rgba(255,255,255,.10);--border2:rgba(255,255,255,.18);
  --text:#f0e6ff;--muted:#7a6a9a;
  --ff:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;--fd:Georgia,'Times New Roman',serif;
  --r:24px;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;width:100%;background:var(--bg);color:var(--text);font-family:var(--ff);overflow:hidden;touch-action:manipulation}

/* ═══════════════ GALAXY CANVAS ═══════════════ */
#galaxy{position:fixed;inset:0;z-index:0;pointer-events:none}

/* ═══════════════ SCREENS ═══════════════ */
.screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .6s ease,transform .6s ease}
.screen.hidden{opacity:0;pointer-events:none;transform:scale(1.04)}

/* ═══════════════ LOCK SCREEN ═══════════════ */
#lock-screen{background:transparent;gap:2rem}
.lock-logo{font-family:var(--fd);font-size:clamp(2.4rem,8vw,4.2rem);font-weight:600;
  background:linear-gradient(135deg,var(--p1),var(--p2),var(--p3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 30px rgba(255,110,180,.6));
  animation:logoPulse 3s ease-in-out infinite alternate}
@keyframes logoPulse{from{filter:drop-shadow(0 0 20px rgba(255,110,180,.4))}to{filter:drop-shadow(0 0 50px rgba(255,110,180,.9))}}
.lock-sub{font-size:.75rem;letter-spacing:.3em;text-transform:uppercase;color:var(--muted)}
.lock-heart{font-size:2.8rem;animation:heartBeat 1.4s ease-in-out infinite}
@keyframes heartBeat{0%,100%{transform:scale(1)}14%{transform:scale(1.25)}28%{transform:scale(1)}}
.lock-label{font-size:.78rem;letter-spacing:.15em;text-transform:uppercase;color:var(--muted);margin-bottom:.5rem}
.pin-dots{display:flex;gap:1rem;margin-bottom:1rem}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid rgba(255,255,255,.3);transition:all .2s}
.pin-dot.filled{background:linear-gradient(135deg,var(--p1),var(--p2));border-color:transparent;box-shadow:var(--neon-pink)}
.pin-pad{display:grid;grid-template-columns:repeat(3,1fr);gap:.7rem;width:220px}
.pin-key{padding:.9rem;border-radius:50%;border:1px solid var(--border2);background:var(--glass2);
  color:var(--text);font-size:1.1rem;font-weight:400;cursor:pointer;
  backdrop-filter:blur(20px);transition:all .2s;display:flex;flex-direction:column;align-items:center;gap:1px}
.pin-key .sub{font-size:.48rem;letter-spacing:.12em;color:var(--muted);text-transform:uppercase}
.pin-key:hover,.pin-key:active{background:rgba(255,110,180,.2);border-color:var(--p1);box-shadow:var(--neon-pink);transform:scale(.95)}
.pin-error{color:#ff4757;font-size:.78rem;letter-spacing:.05em;min-height:1rem;animation:shake .3s ease}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}

/* ═══════════════ WELCOME SCREEN ═══════════════ */
#welcome-screen{gap:1.8rem}
.welcome-card{background:rgba(255,255,255,.05);backdrop-filter:blur(40px);border:1px solid var(--border2);
  border-radius:28px;padding:2.5rem 2.2rem;display:flex;flex-direction:column;align-items:center;gap:1.4rem;
  box-shadow:0 24px 80px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.12);
  width:min(360px,90vw)}
.welcome-logo{font-family:var(--fd);font-size:2.4rem;font-weight:600;
  background:linear-gradient(135deg,var(--p1),var(--p2),var(--p3));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
  filter:drop-shadow(0 0 20px rgba(255,110,180,.5))}
.welcome-sub{font-size:.72rem;letter-spacing:.25em;text-transform:uppercase;color:var(--muted)}
.divider{width:100%;height:1px;background:linear-gradient(90deg,transparent,var(--p2),transparent)}
.choose-label{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted)}
.choose-btns{display:flex;gap:.8rem;width:100%}
.choose-btn{flex:1;padding:1rem .5rem;border-radius:16px;border:1px solid var(--border2);
  background:var(--glass);color:var(--text);font-family:var(--ff);font-size:.88rem;
  cursor:pointer;backdrop-filter:blur(20px);transition:all .3s;display:flex;flex-direction:column;align-items:center;gap:.4rem}
.choose-btn .cav{font-size:1.8rem}
.choose-btn .cn{font-size:.75rem;font-weight:500;letter-spacing:.08em}
.choose-btn:hover{transform:translateY(-3px)}
.choose-btn[data-user="partner1"]:hover{border-color:var(--p1);box-shadow:var(--neon-pink);background:rgba(255,110,180,.1)}
.choose-btn[data-user="partner2"]:hover{border-color:var(--p3);box-shadow:var(--neon-blue);background:rgba(110,180,255,.1)}
.welcome-note{font-size:.68rem;color:var(--muted);text-align:center;line-height:1.7;letter-spacing:.04em}

/* ═══════════════ CHAT SCREEN ═══════════════ */
#chat-screen{position:fixed;inset:0;z-index:10;display:flex;flex-direction:column;
  max-width:500px;margin:0 auto;transition:opacity .6s,transform .6s}
#chat-screen.hidden{opacity:0;pointer-events:none;transform:translateY(30px)}
@media(min-width:520px){
  #chat-screen{top:.8rem;bottom:.8rem;left:50%;transform:translateX(-50%);border-radius:36px;
    border:1px solid var(--border2);overflow:hidden;
    box-shadow:0 0 100px rgba(255,110,180,.12),0 40px 120px rgba(0,0,0,.6),inset 0 1px 0 rgba(255,255,255,.1)}
  #chat-screen.hidden{transform:translateX(-50%) translateY(30px)}
}

/* HEADER */
#chat-header{display:flex;align-items:center;gap:.8rem;padding:.9rem 1rem;
  background:rgba(4,2,14,.75);backdrop-filter:blur(40px);border-bottom:1px solid var(--border);flex-shrink:0;
  position:relative;z-index:5}
.status-ring{width:46px;height:46px;border-radius:50%;position:relative;flex-shrink:0;cursor:pointer;
  background:linear-gradient(135deg,var(--p1),var(--p2));padding:2px;
  box-shadow:var(--neon-pink);animation:ringPulse 2s ease-in-out infinite alternate}
@keyframes ringPulse{from{box-shadow:0 0 10px rgba(255,110,180,.5)}to{box-shadow:0 0 25px rgba(255,110,180,.9),0 0 50px rgba(255,110,180,.3)}}
.status-ring.offline{background:linear-gradient(135deg,#444,#222);box-shadow:none;animation:none}
.avatar-inner{width:100%;height:100%;border-radius:50%;background:var(--bg);display:flex;align-items:center;justify-content:center;font-size:1.5rem}
.online-dot{position:absolute;bottom:1px;right:1px;width:12px;height:12px;border-radius:50%;
  background:#2ecc71;border:2px solid var(--bg);box-shadow:0 0 8px #2ecc71;
  animation:onlinePulse 1.5s ease-in-out infinite}
@keyframes onlinePulse{0%,100%{box-shadow:0 0 4px #2ecc71}50%{box-shadow:0 0 12px #2ecc71,0 0 20px rgba(46,204,113,.5)}}
.online-dot.hidden-dot{display:none}
.header-info{flex:1;min-width:0}
.header-info h2{font-size:1rem;font-weight:600;letter-spacing:.04em;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-status{font-size:.68rem;color:var(--muted);letter-spacing:.1em;margin-top:.15rem;transition:all .3s}
.header-status.online-txt{color:#2ecc71;text-shadow:0 0 8px rgba(46,204,113,.7)}
.hdr-btns{display:flex;gap:.4rem}
.hdr-btn{width:34px;height:34px;border-radius:50%;border:1px solid var(--border);background:var(--glass);
  color:var(--text);font-size:.95rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(10px);transition:all .2s}
.hdr-btn:hover{border-color:var(--p1);box-shadow:var(--neon-pink);transform:scale(1.1)}
.my-strip{display:flex;align-items:center;gap:.5rem;padding:.4rem 1rem;
  background:rgba(4,2,14,.5);border-bottom:1px solid var(--border);font-size:.68rem;
  color:var(--muted);flex-shrink:0;letter-spacing:.08em}

/* MESSAGES */
#messages{flex:1;overflow-y:auto;overflow-x:hidden;padding:.9rem .8rem;display:flex;flex-direction:column;gap:.5rem;overscroll-behavior:contain}
#messages::-webkit-scrollbar{width:2px}
#messages::-webkit-scrollbar-thumb{background:rgba(255,110,180,.3);border-radius:4px}
.date-sep{text-align:center;font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;
  color:var(--muted);padding:.4rem 0;display:flex;align-items:center;gap:.8rem}
.date-sep::before,.date-sep::after{content:'';flex:1;height:1px;background:var(--border)}

/* BUBBLE */
.msg-wrap{display:flex;align-items:flex-end;gap:.4rem;animation:bubbleIn .35s cubic-bezier(.175,.885,.32,1.275) both;position:relative}
@keyframes bubbleIn{from{opacity:0;transform:translateY(16px) scale(.88)}to{opacity:1;transform:none}}
.msg-wrap.mine{flex-direction:row-reverse}
.msg-avatar{width:28px;height:28px;border-radius:50%;font-size:.9rem;display:flex;align-items:center;
  justify-content:center;flex-shrink:0;background:var(--glass);border:1px solid var(--border)}
.bubble-col{display:flex;flex-direction:column;max-width:min(72%,300px);gap:.15rem}
.mine .bubble-col{align-items:flex-end}
.theirs .bubble-col{align-items:flex-start}
.bubble{padding:.6rem .95rem;border-radius:20px;font-size:.875rem;font-weight:300;line-height:1.55;
  word-break:break-word;cursor:pointer;transition:transform .15s,filter .15s;position:relative}
.bubble:active{transform:scale(.97)}
.mine .bubble{background:linear-gradient(135deg,#c084fc,#ff6eb4);color:#fff;
  border-bottom-right-radius:5px;box-shadow:0 6px 25px rgba(255,110,180,.35),0 2px 8px rgba(0,0,0,.3)}
.theirs .bubble{background:var(--glass2);backdrop-filter:blur(20px);border:1px solid var(--border2);
  border-bottom-left-radius:5px;color:var(--text)}
.bubble:hover{filter:brightness(1.08)}
/* image bubble */
.bubble.img-bubble{padding:3px;overflow:hidden;background:transparent;border:1px solid var(--border2)}
.bubble.img-bubble img{max-width:220px;max-height:260px;border-radius:17px;display:block;object-fit:cover}
/* voice bubble */
.voice-bubble{display:flex;align-items:center;gap:.6rem;padding:.5rem .9rem;min-width:160px}
.vb-play{width:28px;height:28px;border-radius:50%;border:none;cursor:pointer;
  background:rgba(255,255,255,.2);color:#fff;font-size:.8rem;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.vb-wave{flex:1;height:28px;display:flex;align-items:center;gap:2px}
.vb-bar{width:3px;border-radius:2px;background:rgba(255,255,255,.7);animation:waveAnim 1s ease-in-out infinite alternate}
.theirs .vb-bar{background:var(--p2)}
.vb-dur{font-size:.68rem;opacity:.8;flex-shrink:0}

/* REACTIONS */
.reactions{display:flex;gap:3px;flex-wrap:wrap;margin-top:.2rem}
.reaction-chip{font-size:.82rem;background:var(--glass2);border:1px solid var(--border);border-radius:20px;
  padding:.1rem .4rem;cursor:pointer;transition:all .15s;backdrop-filter:blur(10px)}
.reaction-chip:hover{border-color:var(--p1);transform:scale(1.15)}
/* emoji picker */
.emoji-picker{position:absolute;bottom:calc(100% + 8px);background:rgba(10,6,26,.92);
  backdrop-filter:blur(30px);border:1px solid var(--border2);border-radius:16px;
  padding:.5rem;display:flex;gap:.3rem;flex-wrap:wrap;width:200px;z-index:100;
  box-shadow:0 16px 48px rgba(0,0,0,.5);animation:popIn .2s ease both}
@keyframes popIn{from{opacity:0;transform:scale(.8) translateY(8px)}to{opacity:1;transform:none}}
.mine .emoji-picker{right:0;left:auto}
.theirs .emoji-picker{left:0}
.ep-btn{font-size:1.1rem;cursor:pointer;transition:transform .15s;padding:.15rem}
.ep-btn:hover{transform:scale(1.4)}
.meta{font-size:.62rem;color:var(--muted);display:flex;align-items:center;gap:.3rem;padding:0 .2rem}
.ticks{color:var(--muted);transition:color .3s}
.ticks.seen{color:var(--p3);text-shadow:0 0 6px rgba(110,180,255,.7)}

/* TYPING */
#typing-wrap{min-height:32px;display:flex;align-items:center;padding:.3rem .9rem;flex-shrink:0}
.typing-bubble{display:none;align-items:center;gap:.5rem;background:var(--glass2);
  border:1px solid var(--border);border-radius:20px;border-bottom-left-radius:5px;
  padding:.45rem .85rem;backdrop-filter:blur(20px)}
.typing-bubble.show{display:flex;animation:bubbleIn .3s ease both}
.typing-dots{display:flex;gap:3px}
.typing-dots span{width:6px;height:6px;border-radius:50%;animation:dotBounce 1.2s ease-in-out infinite}
.typing-dots span:nth-child(1){background:var(--p1);animation-delay:0s}
.typing-dots span:nth-child(2){background:var(--p2);animation-delay:.2s}
.typing-dots span:nth-child(3){background:var(--p3);animation-delay:.4s}
@keyframes dotBounce{0%,60%,100%{transform:translateY(0);opacity:.5}30%{transform:translateY(-7px);opacity:1}}
.typing-name{font-size:.7rem;color:var(--muted);letter-spacing:.05em}

/* INPUT BAR */
#input-bar{display:flex;align-items:flex-end;gap:.5rem;padding:.65rem .8rem;
  background:rgba(4,2,14,.8);backdrop-filter:blur(40px);border-top:1px solid var(--border);flex-shrink:0}
.input-wrap{flex:1;position:relative;display:flex;align-items:flex-end}
#msg-input{width:100%;background:var(--glass2);border:1.5px solid var(--border);border-radius:22px;
  padding:.65rem 1rem;color:var(--text);font-family:var(--ff);font-size:.88rem;font-weight:300;
  outline:none;resize:none;max-height:100px;line-height:1.45;
  transition:border-color .25s,box-shadow .25s;field-sizing:content}
#msg-input::placeholder{color:var(--muted)}
#msg-input:focus{border-color:rgba(255,110,180,.6);box-shadow:0 0 0 3px rgba(255,110,180,.1),var(--neon-pink)}
.ib-btn{width:40px;height:40px;border-radius:50%;border:1px solid var(--border);background:var(--glass);
  color:var(--text);font-size:1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:all .2s;backdrop-filter:blur(10px)}
.ib-btn:hover{border-color:var(--p2);box-shadow:var(--neon-purple);transform:scale(1.1)}
#send-btn{width:44px;height:44px;border-radius:50%;border:none;flex-shrink:0;
  background:linear-gradient(135deg,var(--p1),var(--p2));color:#fff;font-size:1rem;
  cursor:pointer;display:flex;align-items:center;justify-content:center;
  box-shadow:0 0 20px rgba(255,110,180,.5);transition:all .2s}
#send-btn:hover{transform:scale(1.12);box-shadow:0 0 35px rgba(255,110,180,.8)}
#send-btn:active{transform:scale(.93)}
#record-btn.recording{border-color:var(--p1);background:rgba(255,110,180,.2);
  box-shadow:var(--neon-pink);animation:recPulse .8s ease-in-out infinite alternate}
@keyframes recPulse{from{box-shadow:var(--neon-pink)}to{box-shadow:0 0 30px rgba(255,110,180,.9),0 0 60px rgba(255,110,180,.4)}}
/* image input */
#img-input{display:none}

/* MUSIC PLAYER */
#music-bar{display:flex;align-items:center;gap:.6rem;padding:.45rem 1rem;
  background:rgba(255,110,180,.07);border-bottom:1px solid rgba(255,110,180,.15);
  font-size:.72rem;color:var(--muted);flex-shrink:0;letter-spacing:.06em;transition:all .3s}
#music-bar.off{display:none}
.music-wave{display:flex;gap:2px;align-items:center;height:14px}
.mw-b{width:2px;border-radius:2px;background:var(--p1);animation:mwAnim 1s ease-in-out infinite alternate}
.mw-b:nth-child(2){animation-delay:.15s}.mw-b:nth-child(3){animation-delay:.3s}.mw-b:nth-child(4){animation-delay:.1s}
@keyframes mwAnim{from{height:4px}to{height:14px}}
#music-bar.paused .mw-b{animation-play-state:paused;height:5px}

/* HEART CANVAS */
#heart-canvas{position:fixed;inset:0;pointer-events:none;z-index:50;overflow:hidden}
.float-heart{position:absolute;pointer-events:none;font-size:1.6rem;
  animation:floatUp 2.4s ease-out forwards}
@keyframes floatUp{0%{transform:translateY(0) scale(.4) rotate(-15deg);opacity:1}
  80%{opacity:.8}100%{transform:translateY(-75vh) scale(1.2) rotate(15deg);opacity:0}}
.burst-ring{position:absolute;border-radius:50%;border:2px solid var(--p1);
  animation:burstRing .8s ease-out forwards;pointer-events:none}
@keyframes burstRing{from{width:0;height:0;opacity:.8;transform:translate(-50%,-50%)}
  to{width:120px;height:120px;opacity:0;transform:translate(-50%,-50%)}}

/* LOADING */
#loading-screen{background:var(--bg);z-index:100;gap:1.4rem}
.loader-logo{font-family:var(--fd);font-size:3.2rem;font-weight:600;
  background:linear-gradient(135deg,var(--p1),var(--p2),var(--p3),var(--p4));
  background-size:300% 300%;animation:gradShift 2s ease infinite;
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
@keyframes gradShift{0%{background-position:0 50%}50%{background-position:100% 50%}100%{background-position:0 50%}}
.loader-ring{width:56px;height:56px;border-radius:50%;border:3px solid rgba(255,110,180,.2);
  border-top-color:var(--p1);border-right-color:var(--p2);animation:spin 1s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loader-txt{font-size:.72rem;letter-spacing:.2em;text-transform:uppercase;color:var(--muted);animation:blink 1.4s ease-in-out infinite}
@keyframes blink{0%,100%{opacity:.4}50%{opacity:1}}

/* NOTIFICATION TOAST */
#toast{position:fixed;top:1rem;left:50%;transform:translateX(-50%) translateY(-80px);
  background:rgba(10,6,26,.92);backdrop-filter:blur(30px);border:1px solid var(--border2);
  border-radius:16px;padding:.6rem 1.2rem;font-size:.8rem;letter-spacing:.06em;
  z-index:200;transition:transform .4s cubic-bezier(.175,.885,.32,1.275);
  box-shadow:0 16px 40px rgba(0,0,0,.5);white-space:nowrap}
#toast.show{transform:translateX(-50%) translateY(0)}

/* PARTICLES for PIN error */
.particle{position:fixed;width:6px;height:6px;border-radius:50%;pointer-events:none;z-index:200;
  animation:particleFly .8s ease-out forwards}
@keyframes particleFly{from{opacity:1;transform:translate(0,0) scale(1)}
  to{opacity:0;transform:var(--tx,translateX(40px)) var(--ty,translateY(-60px)) scale(.2)}}
</style>
</head>
<body>

<!-- Galaxy Canvas -->
<canvas id="galaxy"></canvas>
<!-- Heart Canvas -->
<div id="heart-canvas"></div>
<!-- Toast -->
<div id="toast">💖 Message sent!</div>

<!-- LOADING -->
<div class="screen" id="loading-screen">
  <div class="loader-logo">LoveLink</div>
  <div class="loader-ring"></div>
  <div class="loader-txt">Connecting the universe…</div>
</div>

<!-- LOCK SCREEN -->
<div class="screen hidden" id="lock-screen">
  <div class="lock-heart">💗</div>
  <div class="lock-logo">LoveLink</div>
  <div class="lock-sub">Private ✦ Encrypted ✦ Yours</div>
  <div class="lock-label">Enter PIN</div>
  <div class="pin-dots">
    <div class="pin-dot" id="pd0"></div>
    <div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div>
    <div class="pin-dot" id="pd3"></div>
  </div>
  <div class="pin-error" id="pin-error"></div>
  <div class="pin-pad" id="pin-pad">
    <button class="pin-key" data-n="1"><span>1</span></button>
    <button class="pin-key" data-n="2"><span>2</span><span class="sub">ABC</span></button>
    <button class="pin-key" data-n="3"><span>3</span><span class="sub">DEF</span></button>
    <button class="pin-key" data-n="4"><span>4</span><span class="sub">GHI</span></button>
    <button class="pin-key" data-n="5"><span>5</span><span class="sub">JKL</span></button>
    <button class="pin-key" data-n="6"><span>6</span><span class="sub">MNO</span></button>
    <button class="pin-key" data-n="7"><span>7</span><span class="sub">PQRS</span></button>
    <button class="pin-key" data-n="8"><span>8</span><span class="sub">TUV</span></button>
    <button class="pin-key" data-n="9"><span>9</span><span class="sub">WXYZ</span></button>
    <button class="pin-key" data-n=""><span>🌌</span></button>
    <button class="pin-key" data-n="0"><span>0</span></button>
    <button class="pin-key" data-n="del"><span>⌫</span></button>
  </div>
</div>

<!-- WELCOME SCREEN -->
<div class="screen hidden" id="welcome-screen">
  <div class="welcome-card">
    <div class="welcome-logo">LoveLink ✦</div>
    <div class="welcome-sub">Your Private Universe</div>
    <div class="divider"></div>
    <div class="choose-label">Who are you?</div>
    <div class="choose-btns">
      <button class="choose-btn" data-user="partner1">
        <span class="cav">💖</span>
        <span class="cn">Partner 1</span>
      </button>

<!-- CHAT SCREEN -->
<div id="chat-screen" class="hidden">

<!-- Firebase -->
<script type="module">
import{initializeApp}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import{getDatabase,ref,push,onValue,set,onDisconnect,get,serverTimestamp,update}from"https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const cfg={apiKey:"AIzaSyBTJYFK38BnPPzugkeA3f0xn6F_IADATMY",authDomain:"jc-learn-73819.firebaseapp.com",
  databaseURL:"https://jc-learn-73819-default-rtdb.firebaseio.com",projectId:"jc-learn-73819",
  storageBucket:"jc-learn-73819.firebasestorage.app",messagingSenderId:"625242380317",
  appId:"1:625242380317:web:77ae8b4430889afabd4ef4"};
const app=initializeApp(cfg);
const db=getDatabase(app);

// ── STATE ──
const PIN="1234";
let pinEntry="",ME=null,OTHER=null,musicOn=false,musicPaused=false,recording=false,mediaRec=null,audioChunks=[];
const USERS={partner1:{name:"Partner 1",avatar:"💖",color:"var(--p1)"},partner2:{name:"Partner 2",avatar:"💙",color:"var(--p3)"}};
const EMOJIS=["❤️","😂","😍","👏","😮","😢","🔥","💯"];

// ── GALAXY ──
(()=>{
  const c=document.getElementById("galaxy"),ctx=c.getContext("2d");
  let W,H,stars=[],nebula=[];
  function resize(){W=c.width=window.innerWidth;H=c.height=window.innerHeight;
    stars=Array.from({length:200},()=>({x:Math.random()*W,y:Math.random()*H,r:Math.random()*1.8+.3,
      a:Math.random(),da:(.002+Math.random()*.003)*(Math.random()<.5?1:-1),
      color:["#fff","#ffb3d9","#b3d9ff","#f9c74f","#d4a0ff"][Math.floor(Math.random()*5)]}));
    nebula=Array.from({length:8},()=>({x:Math.random()*W,y:Math.random()*H,
      r:100+Math.random()*200,color:["rgba(255,110,180,.06)","rgba(192,132,252,.06)","rgba(110,180,255,.06)"][Math.floor(Math.random()*3)]}));
  }
  let meteors=[],mTimer=0;
  function tick(t){
    ctx.clearRect(0,0,W,H);
    // deep bg gradient
    const g=ctx.createRadialGradient(W*.3,H*.2,0,W*.5,H*.5,W);
    g.addColorStop(0,"rgba(30,5,60,.8)");g.addColorStop(.5,"rgba(10,2,30,.9)");g.addColorStop(1,"rgba(4,2,14,1)");
    ctx.fillStyle=g;ctx.fillRect(0,0,W,H);
    // nebula
    nebula.forEach(n=>{const ng=ctx.createRadialGradient(n.x,n.y,0,n.x,n.y,n.r);
      ng.addColorStop(0,n.color);ng.addColorStop(1,"transparent");
      ctx.fillStyle=ng;ctx.beginPath();ctx.arc(n.x,n.y,n.r,0,Math.PI*2);ctx.fill()});
    // stars
    stars.forEach(s=>{s.a+=s.da;if(s.a>1||s.a<0)s.da*=-1;
      ctx.save();ctx.globalAlpha=Math.abs(s.a);
      ctx.fillStyle=s.color;
      // cross sparkle for large stars
      if(s.r>1.2){ctx.strokeStyle=s.color;ctx.lineWidth=.5;ctx.beginPath();
        ctx.moveTo(s.x-s.r*2,s.y);ctx.lineTo(s.x+s.r*2,s.y);
        ctx.moveTo(s.x,s.y-s.r*2);ctx.lineTo(s.x,s.y+s.r*2);ctx.stroke()}
      ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();
      ctx.restore()});
    // meteors
    if(t-mTimer>4000&&Math.random()<.3){mTimer=t;meteors.push({x:Math.random()*W,y:0,vx:-3-Math.random()*3,vy:2+Math.random()*3,life:1})}
    meteors=meteors.filter(m=>{m.x+=m.vx;m.y+=m.vy;m.life-=.015;
      if(m.life<=0)return false;
      ctx.save();ctx.globalAlpha=m.life;
      const mg=ctx.createLinearGradient(m.x,m.y,m.x-m.vx*12,m.y-m.vy*12);
      mg.addColorStop(0,"rgba(255,255,255,.9)");mg.addColorStop(1,"transparent");
      ctx.strokeStyle=mg;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(m.x,m.y);ctx.lineTo(m.x-m.vx*12,m.y-m.vy*12);ctx.stroke();
      ctx.restore();return true});
    requestAnimationFrame(tick);
  }
  resize();window.addEventListener("resize",resize);requestAnimationFrame(tick);
})();

// ── WAVE BARS for voice (random heights) ──
function makeWaveBars(n=16){return Array.from({length:n},(_,i)=>{
  const b=document.createElement("div");b.className="vb-bar";
  const h=4+Math.random()*20;b.style.cssText=`height:${h}px;animation-delay:${i*.07}s`;return b})}

// ── LOADING → LOCK ──
setTimeout(()=>{
  document.getElementById("loading-screen").classList.add("hidden");
  document.getElementById("lock-screen").classList.remove("hidden");
},1800);

// ── PIN ──
document.getElementById("pin-pad").addEventListener("click",e=>{
  const btn=e.target.closest(".pin-key");if(!btn)return;
  const n=btn.dataset.n;
  if(n==="del"){pinEntry=pinEntry.slice(0,-1)}
  else if(n===""){}
  else{pinEntry+=n}
  // update dots
  for(let i=0;i<4;i++)document.getElementById("pd"+i).classList.toggle("filled",i<pinEntry.length);
  if(pinEntry.length===4){
    if(pinEntry===PIN){
      document.getElementById("lock-screen").classList.add("hidden");
      document.getElementById("welcome-screen").classList.remove("hidden");
    }else{
      const err=document.getElementById("pin-error");
      err.textContent="Incorrect PIN. Try 1234 💕";
      spawnParticles();
      pinEntry="";for(let i=0;i<4;i++)document.getElementById("pd"+i).classList.remove("filled");
      setTimeout(()=>err.textContent="",2000);
    }
  }
});
function spawnParticles(){
  for(let i=0;i<12;i++){
    const p=document.createElement("div");p.className="particle";
    const angle=Math.random()*360,dist=40+Math.random()*80;
    const tx=Math.cos(angle*Math.PI/180)*dist,ty=Math.sin(angle*Math.PI/180)*dist;
    p.style.cssText=`left:50%;top:60%;background:${["var(--p1)","var(--p2)","var(--p3)"][Math.floor(Math.random()*3)]};--tx:translateX(${tx}px);--ty:translateY(${ty}px);animation-delay:${Math.random()*.2}s`;
    document.body.appendChild(p);setTimeout(()=>p.remove(),1000);
  }
}

// ── CHOOSE PARTNER ──
document.querySelectorAll(".choose-btn").forEach(b=>b.addEventListener("click",()=>{
  ME=b.dataset.user;OTHER=ME==="partner1"?"partner2":"partner1";
  initChat();
}));

// ── MUSIC ──
const audioCtx=new(window.AudioContext||window.webkitAudioContext)();
let musicGain,musicOsc1,musicOsc2;
function startMusic(){
  if(musicOsc1)return;
  musicGain=audioCtx.createGain();musicGain.gain.value=.04;musicGain.connect(audioCtx.destination);
  const freqs=[261.63,329.63,392,523.25];let fi=0;
  function playNote(){
    const o=audioCtx.createOscillator();o.type="sine";
    const g=audioCtx.createGain();o.connect(g);g.connect(musicGain);
    o.frequency.value=freqs[fi%freqs.length];fi++;
    g.gain.setValueAtTime(0,audioCtx.currentTime);g.gain.linearRampToValueAtTime(.5,audioCtx.currentTime+.1);
    g.gain.linearRampToValueAtTime(0,audioCtx.currentTime+1.5);
    o.start();o.stop(audioCtx.currentTime+1.5);
    setTimeout(playNote,1800);
  }
  playNote();
}
document.getElementById("music-btn").addEventListener("click",()=>{
  musicOn=!musicOn;
  const bar=document.getElementById("music-bar");
  if(musicOn){bar.classList.remove("off");audioCtx.resume();startMusic();showToast("🎵 Music on!")}
  else{bar.classList.add("off");showToast("🔇 Music off")}
});
document.getElementById("music-toggle-btn").addEventListener("click",()=>{
  musicPaused=!musicPaused;
  document.getElementById("music-bar").classList.toggle("paused",musicPaused);
  document.getElementById("music-toggle-btn").textContent=musicPaused?"▶":"⏸";
  if(musicGain)musicGain.gain.value=musicPaused?0:.04;
});
document.getElementById("lock-btn").addEventListener("click",()=>{
  document.getElementById("chat-screen").classList.add("hidden");
  document.getElementById("lock-screen").classList.remove("hidden");
  pinEntry="";for(let i=0;i<4;i++)document.getElementById("pd"+i).classList.remove("filled");
});
document.getElementById("heart-burst-btn").addEventListener("click",()=>launchHearts(8));

// ── TOAST ──
function showToast(msg,dur=2000){const t=document.getElementById("toast");t.textContent=msg;t.classList.add("show");setTimeout(()=>t.classList.remove("show"),dur)}

// ── INIT CHAT ──
function initChat(){
  document.getElementById("welcome-screen").classList.add("hidden");
  document.getElementById("chat-screen").classList.remove("hidden");
  const mi=USERS[ME],oi=USERS[OTHER];
  document.getElementById("my-avatar").textContent=mi.avatar;
  document.getElementById("my-name").textContent=mi.name;
  document.getElementById("other-avatar").textContent=oi.avatar;
  document.getElementById("other-name").textContent=oi.name;
  document.getElementById("typing-name").textContent=oi.name+" is typing…";

  // Presence
  const presRef=ref(db,`presence/${ME}`);
  set(presRef,{online:true,name:mi.name});
  onDisconnect(presRef).set({online:false,name:mi.name});
  onValue(ref(db,`presence/${OTHER}`),snap=>{
    const online=snap.val()?.online===true;
    document.getElementById("status-ring").className="status-ring"+(online?"":" offline");
    document.getElementById("online-dot").classList.toggle("hidden-dot",!online);
    document.getElementById("header-status").textContent=online?"Online ❤️":"Offline";
    document.getElementById("header-status").className="header-status"+(online?" online-txt":"");
  });

  // Typing
  onValue(ref(db,`typing/${OTHER}`),snap=>{
    document.getElementById("typing-bubble").classList.toggle("show",!!snap.val());
  });

  // Messages
  onValue(ref(db,"messages"),snap=>{
    document.getElementById("messages").innerHTML="";
    if(!snap.exists())return;
    let lastDate="";
    snap.forEach(ch=>{
      const d=ch.val();
      const dateStr=new Date(d.timestamp).toLocaleDateString("en-US",{weekday:"short",month:"short",day:"numeric"});
      if(dateStr!==lastDate){lastDate=dateStr;addDateSep(dateStr)}
      renderMsg(d,ch.key);
    });
    scrollBottom();
    markSeen();
  });

  window.addEventListener("focus",markSeen);
}

function addDateSep(txt){
  const s=document.createElement("div");s.className="date-sep";s.textContent=txt;
  document.getElementById("messages").appendChild(s);
}

// ── RENDER MESSAGE ──
function renderMsg(data,key){
  const isMine=data.sender===ME;
  const wrap=document.createElement("div");
  wrap.className=`msg-wrap ${isMine?"mine":"theirs"}`;
  wrap.dataset.key=key;

  const av=document.createElement("div");
  av.className="msg-avatar";av.textContent=USERS[data.sender]?.avatar||"💬";
  const col=document.createElement("div");col.className="bubble-col";

  const bub=document.createElement("div");
  bub.className="bubble";

  if(data.type==="image"){
    bub.className+=" img-bubble";
    const img=document.createElement("img");img.src=data.img;img.alt="photo";
    bub.appendChild(img);
  }else if(data.type==="voice"){
    bub.className+=" voice-bubble";
    const play=document.createElement("button");play.className="vb-play";play.textContent="▶";
    const wave=document.createElement("div");wave.className="vb-wave";
    makeWaveBars(14).forEach(b=>wave.appendChild(b));
    const dur=document.createElement("span");dur.className="vb-dur";dur.textContent=data.duration||"0:03";
    let playing=false;let audioEl=null;
    play.addEventListener("click",()=>{
      if(!playing){if(!audioEl){audioEl=new Audio(data.audio);audioEl.onended=()=>{playing=false;play.textContent="▶";wave.querySelectorAll(".vb-bar").forEach(b=>b.style.animationPlayState="paused")}}
        audioEl.play();playing=true;play.textContent="⏸";wave.querySelectorAll(".vb-bar").forEach(b=>b.style.animationPlayState="running");
      }else{audioEl.pause();playing=false;play.textContent="▶";wave.querySelectorAll(".vb-bar").forEach(b=>b.style.animationPlayState="paused")}
    });
    bub.append(play,wave,dur);
  }else{
    bub.textContent=data.text||"";
  }

  // Long-press / right-click for emoji picker
  let pressTimer;
  bub.addEventListener("mousedown",e=>{pressTimer=setTimeout(()=>showEmojiPicker(wrap,key),500)});
  bub.addEventListener("touchstart",e=>{pressTimer=setTimeout(()=>showEmojiPicker(wrap,key),500)},{passive:true});
  bub.addEventListener("mouseup",()=>clearTimeout(pressTimer));
  bub.addEventListener("touchend",()=>clearTimeout(pressTimer));
  bub.addEventListener("dblclick",()=>showEmojiPicker(wrap,key));
  bub.addEventListener("contextmenu",e=>{e.preventDefault();showEmojiPicker(wrap,key)});

  const time=new Date(data.timestamp).toLocaleTimeString([],{hour:"2-digit",minute:"2-digit"});
  const meta=document.createElement("div");meta.className="meta";
  meta.innerHTML=`${time}${isMine?` <span class="ticks${data.seen?" seen":""}">✔${data.seen?"✔":""}</span>`:""}`;

  const reactionDiv=document.createElement("div");reactionDiv.className="reactions";
  if(data.reactions){Object.entries(data.reactions).forEach(([uid,emoji])=>{
    const chip=document.createElement("div");chip.className="reaction-chip";chip.textContent=emoji;
    chip.addEventListener("click",()=>addReaction(key,null));
    reactionDiv.appendChild(chip);
  })}

  col.append(bub,reactionDiv,meta);
  wrap.append(isMine?col:av, isMine?av:col);
  document.getElementById("messages").appendChild(wrap);
}

// ── EMOJI PICKER ──
function showEmojiPicker(wrap,key){
  document.querySelectorAll(".emoji-picker").forEach(e=>e.remove());
  const picker=document.createElement("div");picker.className="emoji-picker";
  EMOJIS.forEach(em=>{const b=document.createElement("span");b.className="ep-btn";b.textContent=em;
    b.addEventListener("click",()=>{addReaction(key,em);picker.remove()});
    picker.appendChild(b)});
  wrap.style.position="relative";wrap.appendChild(picker);
  setTimeout(()=>document.addEventListener("click",()=>picker.remove(),{once:true}),100);
}
function addReaction(key,emoji){
  if(!emoji)return;
  const r={};r[ME]=emoji;
  update(ref(db,`messages/${key}/reactions`),r);
}

// ── SEND ──
function sendMessage(type="text",extra={}){
  const input=document.getElementById("msg-input");
  const text=type==="text"?input.value.trim():"";
  if(type==="text"&&!text)return;
  if(type==="text")input.value="";
  set(ref(db,`typing/${ME}`),false);
  const payload={sender:ME,type,timestamp:Date.now(),seen:false,...(type==="text"?{text}:extra)};
  push(ref(db,"messages"),payload);
  playSendSound();launchHearts(4);
  setTimeout(scrollBottom,100);
}

document.getElementById("send-btn").addEventListener("click",()=>sendMessage());
document.getElementById("msg-input").addEventListener("keydown",e=>{
  if(e.key==="Enter"&&!e.shiftKey){e.preventDefault();sendMessage()}
});

// ── TYPING INDICATOR ──
let typTimer;
document.getElementById("msg-input").addEventListener("input",()=>{
  set(ref(db,`typing/${ME}`),true);clearTimeout(typTimer);
  typTimer=setTimeout(()=>set(ref(db,`typing/${ME}`),false),1500);
});

// ── IMAGE ──
document.getElementById("img-btn").addEventListener("click",()=>document.getElementById("img-input").click());
document.getElementById("img-input").addEventListener("change",e=>{
  const file=e.target.files[0];if(!file)return;
  const reader=new FileReader();
  reader.onload=ev=>sendMessage("image",{img:ev.target.result});
  reader.readAsDataURL(file);
  e.target.value="";
});

// ── VOICE ──
document.getElementById("record-btn").addEventListener("click",async()=>{
  if(!recording){
    try{
      const stream=await navigator.mediaDevices.getUserMedia({audio:true});
      mediaRec=new MediaRecorder(stream);audioChunks=[];
      mediaRec.ondataavailable=e=>audioChunks.push(e.data);
      mediaRec.onstop=()=>{
        const blob=new Blob(audioChunks,{type:"audio/webm"});
        const reader=new FileReader();
        reader.onload=ev=>{
          sendMessage("voice",{audio:ev.target.result,duration:"0:"+(Math.floor(Math.random()*9)+1).toString().padStart(2,"0")});
        };
        reader.readAsDataURL(blob);
        stream.getTracks().forEach(t=>t.stop());
      };
      mediaRec.start();recording=true;
      document.getElementById("record-btn").classList.add("recording");
      document.getElementById("record-btn").textContent="⏹";
      showToast("🎙️ Recording…");
    }catch{showToast("🎙️ Mic access denied")}
  }else{
    mediaRec.stop();recording=false;
    document.getElementById("record-btn").classList.remove("recording");
    document.getElementById("record-btn").textContent="🎙️";
    showToast("✅ Voice sent!");
  }
});

// ── MARK SEEN ──
function markSeen(){
  if(!ME)return;
  get(ref(db,"messages")).then(snap=>{
    snap.forEach(ch=>{const d=ch.val();
      if(d.sender!==ME&&!d.seen)set(ref(db,`messages/${ch.key}/seen`),true);
    });
  });
}

// ── HEARTS ──
function launchHearts(n=6){
  const canvas=document.getElementById("heart-canvas");
  const emojis=["❤️","💕","💖","💗","✨","🌸","💫","⭐"];
  for(let i=0;i<n;i++){
    const h=document.createElement("div");h.className="float-heart";
    h.textContent=emojis[Math.floor(Math.random()*emojis.length)];
    h.style.cssText=`left:${15+Math.random()*70}%;bottom:80px;animation-duration:${1.8+Math.random()*1.2}s;animation-delay:${Math.random()*.3}s;font-size:${1+Math.random()*1.2}rem`;
    canvas.appendChild(h);setTimeout(()=>h.remove(),3000);
  }
}

// ── SEND SOUND ──
function playSendSound(){
  try{
    const ctx2=new(window.AudioContext||window.webkitAudioContext)();
    const o=ctx2.createOscillator(),g=ctx2.createGain();
    o.connect(g);g.connect(ctx2.destination);
    o.type="sine";o.frequency.setValueAtTime(900,ctx2.currentTime);
    o.frequency.exponentialRampToValueAtTime(500,ctx2.currentTime+.12);
    g.gain.setValueAtTime(.07,ctx2.currentTime);g.gain.exponentialRampToValueAtTime(.001,ctx2.currentTime+.15);
    o.start();o.stop(ctx2.currentTime+.15);
  }catch{}
}

function scrollBottom(){
  const m=document.getElementById("messages");
  m.scrollTo({top:m.scrollHeight,behavior:"smooth"});
}
</script>
